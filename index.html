<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Premium Bucket List</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>

    <style>
        /* スクロールバーのカスタム */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #334155; }
    </style>
</head>
<body class="bg-[#0f172a]">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { 
            Plus, Trash2, Check, Star, Calendar, Hash, X, 
            GripVertical, ClipboardList, CheckSquare 
        } = lucide;

        const BucketListApp = () => {
            const [items, setItems] = useState([]);
            const [inputValue, setInputValue] = useState('');
            const [draggedIndex, setDraggedIndex] = useState(null);
            const [editingTagId, setEditingTagId] = useState(null);
            const [tagInput, setTagInput] = useState('');
            const [sortMode, setSortMode] = useState('custom');

            // --- データの読み込み ---
            useEffect(() => {
                const savedItems = localStorage.getItem('bucket-list-v7');
                const savedSortMode = localStorage.getItem('bucket-list-sort-mode');
                if (savedItems) setItems(JSON.parse(savedItems));
                if (savedSortMode) setSortMode(savedSortMode);
            }, []);

            // --- データの保存 ---
            useEffect(() => {
                localStorage.setItem('bucket-list-v7', JSON.stringify(items));
            }, [items]);

            useEffect(() => {
                localStorage.setItem('bucket-list-sort-mode', sortMode);
            }, [sortMode]);

            // --- 関数 (ロジック) ---
            const addItem = (e) => {
                e.preventDefault();
                if (!inputValue.trim()) return;
                const newItem = {
                    id: Date.now(),
                    text: inputValue,
                    completed: false,
                    tags: [],
                    createdAt: new Date().toLocaleDateString('ja-JP', { month: 'short', day: 'numeric' }),
                    completedAt: null,
                };
                setItems([newItem, ...items]);
                setInputValue('');
            };

            const toggleComplete = (id) => {
                setItems(items.map(item => {
                    if (item.id === id) {
                        const isCompleting = !item.completed;
                        return { 
                            ...item, 
                            completed: isCompleting,
                            completedAt: isCompleting ? new Date().toLocaleDateString('ja-JP', { month: 'short', day: 'numeric' }) : null
                        };
                    }
                    return item;
                }));
            };

            const deleteItem = (id) => {
                setItems(items.filter(item => item.id !== id));
            };

            const addTag = (itemId) => {
                if (!tagInput.trim()) return;
                const cleanTag = tagInput.trim().replace(/^#/, '');
                setItems(items.map(item => {
                    if (item.id === itemId) {
                        if (item.tags.includes(cleanTag)) return item;
                        return { ...item, tags: [...item.tags, cleanTag] };
                    }
                    return item;
                }));
                setTagInput('');
                setEditingTagId(null);
            };

            const removeTag = (itemId, tagToRemove) => {
                setItems(items.map(item => {
                    if (item.id === itemId) {
                        return { ...item, tags: item.tags.filter(t => t !== tagToRemove) };
                    }
                    return item;
                }));
            };

            const getTagColor = (tag) => {
                const colors = [
                    'bg-blue-500/20 text-blue-400 border-blue-500/30',
                    'bg-purple-500/20 text-purple-400 border-purple-500/30',
                    'bg-rose-500/20 text-rose-400 border-rose-500/30',
                    'bg-amber-500/20 text-amber-400 border-amber-500/30',
                    'bg-emerald-500/20 text-emerald-400 border-emerald-500/30',
                    'bg-indigo-500/20 text-indigo-400 border-indigo-500/30',
                ];
                let hash = 0;
                for (let i = 0; i < tag.length; i++) {
                    hash = tag.charCodeAt(i) + ((hash << 5) - hash);
                }
                return colors[Math.abs(hash) % colors.length];
            };

            const sortedItems = useMemo(() => {
                const list = [...items];
                if (sortMode === 'completed-bottom') {
                    return list.sort((a, b) => (a.completed === b.completed ? 0 : a.completed ? 1 : -1));
                }
                if (sortMode === 'tags') {
                    return list.sort((a, b) => {
                        const tagA = a.tags[0] || 'zzz';
                        const tagB = b.tags[0] || 'zzz';
                        return tagA.localeCompare(tagB);
                    });
                }
                return items;
            }, [items, sortMode]);

            const handleDragStart = (index) => {
                if (sortMode !== 'custom') return;
                setDraggedIndex(index);
            };

            const handleDragOver = (e, index) => {
                e.preventDefault();
                if (sortMode !== 'custom' || draggedIndex === null || draggedIndex === index) return;
                const newItems = [...items];
                const draggedItem = newItems[draggedIndex];
                newItems.splice(draggedIndex, 1);
                newItems.splice(index, 0, draggedItem);
                setDraggedIndex(index);
                setItems(newItems);
            };

            // --- レンダリング (HTML構造) ---
            return (
                <div className="min-h-screen bg-[#0f172a] bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-slate-900 via-slate-900 to-indigo-950 p-4 md:p-12 font-sans text-slate-200">
                    <div className="max-w-xl mx-auto flex flex-col h-[88vh]">
                        
                        <div className="mb-6 px-2 flex justify-between items-end">
                            <div>
                                <h1 className="text-4xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-white to-slate-400 mb-1 flex items-center gap-3">
                                    Bucket List
                                    <Star className="w-6 h-6 text-yellow-400 fill-yellow-400 animate-pulse" />
                                </h1>
                                <p className="text-slate-500 text-sm font-medium uppercase tracking-[0.2em]">Curate your life's adventures</p>
                            </div>
                            <div className="text-right">
                                <span className="text-3xl font-light text-slate-300">{items.filter(i => i.completed).length}</span>
                                <span className="text-slate-600 mx-1">/</span>
                                <span className="text-slate-500 text-lg">{items.length}</span>
                            </div>
                        </div>

                        <div className="flex bg-slate-900/50 backdrop-blur-md p-1 rounded-xl border border-white/5 mb-6 self-start">
                            <button onClick={() => setSortMode('custom')} className={`flex items-center gap-2 px-3 py-1.5 rounded-lg text-[10px] font-bold tracking-wider transition-all ${sortMode === 'custom' ? 'bg-white text-slate-900 shadow-lg' : 'text-slate-500 hover:text-slate-300'}`}>
                                <GripVertical className="w-3 h-3" /> CUSTOM
                            </button>
                            <button onClick={() => setSortMode('tags')} className={`flex items-center gap-2 px-3 py-1.5 rounded-lg text-[10px] font-bold tracking-wider transition-all ${sortMode === 'tags' ? 'bg-indigo-500 text-white shadow-lg' : 'text-slate-500 hover:text-slate-300'}`}>
                                <Hash className="w-3 h-3" /> TAGS
                            </button>
                            <button onClick={() => setSortMode('completed-bottom')} className={`flex items-center gap-2 px-3 py-1.5 rounded-lg text-[10px] font-bold tracking-wider transition-all ${sortMode === 'completed-bottom' ? 'bg-emerald-500 text-white shadow-lg' : 'text-slate-500 hover:text-slate-300'}`}>
                                <CheckSquare className="w-3 h-3" /> AUTO-SORT
                            </button>
                        </div>

                        <div className="mb-8 relative group">
                            <div className="absolute -inset-1 bg-gradient-to-r from-indigo-500 to-purple-600 rounded-2xl blur opacity-25 group-focus-within:opacity-50 transition duration-1000"></div>
                            <form onSubmit={addItem} className="relative flex gap-2 bg-slate-900/80 backdrop-blur-xl border border-white/10 p-2 rounded-2xl shadow-2xl">
                                <input
                                    type="text"
                                    value={inputValue}
                                    onChange={(e) => setInputValue(e.target.value)}
                                    placeholder="新しい冒険を計画する..."
                                    className="flex-1 bg-transparent px-4 py-3 outline-none text-white placeholder:text-slate-600 text-lg"
                                />
                                <button type="submit" className="bg-white hover:bg-slate-200 text-slate-950 p-3 rounded-xl transition-all shadow-xl active:scale-90 flex items-center justify-center shrink-0">
                                    <Plus className="w-6 h-6" />
                                </button>
                            </form>
                        </div>

                        <div className="flex-1 overflow-y-auto pr-2 custom-scrollbar">
                            {sortedItems.length === 0 ? (
                                <div className="flex flex-col items-center justify-center h-full text-slate-600 space-y-4">
                                    <div className="w-20 h-20 rounded-full border-2 border-dashed border-slate-800 flex items-center justify-center">
                                        <ClipboardList className="w-8 h-8 opacity-20" />
                                    </div>
                                    <p className="font-medium tracking-wide">リストはまだ空です</p>
                                </div>
                            ) : (
                                <div className="space-y-4 pb-12">
                                    {sortedItems.map((item, index) => (
                                        <div 
                                            key={item.id}
                                            draggable={sortMode === 'custom'}
                                            onDragStart={() => handleDragStart(index)}
                                            onDragOver={(e) => handleDragOver(e, index)}
                                            onDragEnd={() => setDraggedIndex(null)}
                                            className={`group flex flex-col gap-3 p-5 rounded-2xl border transition-all duration-300 relative overflow-hidden ${
                                                sortMode === 'custom' ? 'cursor-move' : 'cursor-default'
                                            } ${
                                                draggedIndex === index ? 'opacity-30 scale-95' : 'opacity-100'
                                            } ${
                                                item.completed ? 'bg-emerald-950/10 border-emerald-500/20' : 'bg-white/5 border-white/5 hover:bg-white/10 hover:border-white/10 shadow-[0_8px_30px_rgb(0,0,0,0.12)]'
                                            }`}
                                        >
                                            <div className="flex items-center gap-4">
                                                <div className={`text-slate-700 transition-colors shrink-0 ${sortMode === 'custom' ? 'group-hover:text-slate-400' : 'opacity-0'}`}>
                                                    <GripVertical className="w-5 h-5" />
                                                </div>

                                                <div className="flex-1 flex items-center gap-4 cursor-pointer select-none" onClick={() => toggleComplete(item.id)}>
                                                    <div className="relative flex-shrink-0">
                                                        {item.completed ? (
                                                            <div className="bg-emerald-500 rounded-xl p-1 shadow-[0_0_15px_rgba(16,185,129,0.4)] animate-in zoom-in-75 duration-300">
                                                                <Check className="w-5 h-5 text-slate-950 stroke-[3px]" />
                                                            </div>
                                                        ) : (
                                                            <div className={`w-7 h-7 rounded-xl border-2 border-slate-700 group-hover:border-slate-500 transition-all flex items-center justify-center`}>
                                                                <div className={`w-2 h-2 rounded-sm bg-indigo-500 opacity-0 group-hover:opacity-100 transition-opacity`}></div>
                                                            </div>
                                                        )}
                                                    </div>

                                                    <div className="flex flex-col min-w-0">
                                                        <span className={`text-lg font-semibold truncate transition-all duration-500 ${item.completed ? 'text-emerald-400/50' : 'text-slate-100'}`}>
                                                            {item.text}
                                                        </span>
                                                        <div className="flex items-center gap-3 mt-1">
                                                            <span className="flex items-center gap-1 text-[10px] text-slate-600 font-bold uppercase tracking-wider">
                                                                <Calendar className="w-3 h-3" /> {item.createdAt}
                                                            </span>
                                                            {item.completedAt && (
                                                                <span className="bg-emerald-500/10 text-emerald-500 text-[10px] px-2 py-0.5 rounded-full font-black border border-emerald-500/20">
                                                                    DONE: {item.completedAt}
                                                                </span>
                                                            )}
                                                        </div>
                                                    </div>
                                                </div>
                                                
                                                <button onClick={(e) => { e.stopPropagation(); deleteItem(item.id); }} className="text-slate-700 hover:text-rose-500 p-2 transition-all opacity-0 group-hover:opacity-100 hover:scale-110 active:scale-90">
                                                    <Trash2 className="w-5 h-5" />
                                                </button>
                                            </div>

                                            <div className="flex flex-wrap items-center gap-2 pl-9">
                                                {item.tags.map(tag => (
                                                    <span key={tag} className={`group/tag flex items-center gap-1 px-2 py-0.5 rounded-lg text-[10px] font-bold border transition-all ${getTagColor(tag)}`}>
                                                        #{tag}
                                                        <button onClick={() => removeTag(item.id, tag)} className="hover:text-white transition-colors">
                                                            <X className="w-3 h-3" />
                                                        </button>
                                                    </span>
                                                ))}
                                                
                                                {editingTagId === item.id ? (
                                                    <div className="flex items-center gap-1 bg-slate-800 rounded-lg px-2 py-0.5 border border-slate-700">
                                                        <span className="text-[10px] text-slate-500">#</span>
                                                        <input 
                                                            autoFocus
                                                            value={tagInput}
                                                            onChange={(e) => setTagInput(e.target.value)}
                                                            onKeyDown={(e) => {
                                                                if (e.key === 'Enter') addTag(item.id);
                                                                if (e.key === 'Escape') setEditingTagId(null);
                                                            }}
                                                            onBlur={() => { if (!tagInput) setEditingTagId(null); }}
                                                            className="bg-transparent border-none outline-none text-[10px] text-white w-16"
                                                            placeholder="タグ..."
                                                        />
                                                    </div>
                                                ) : (
                                                    <button onClick={() => setEditingTagId(item.id)} className="flex items-center gap-1 px-2 py-0.5 rounded-lg text-[10px] font-bold text-slate-600 border border-dashed border-slate-800 hover:border-slate-600 hover:text-slate-400 transition-all">
                                                        <Hash className="w-3 h-3" /> タグを追加
                                                    </button>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        <div className="py-6 text-center shrink-0">
                            <div className="h-px w-full bg-gradient-to-r from-transparent via-slate-800 to-transparent mb-4"></div>
                            <p className="text-[10px] text-slate-700 font-black tracking-[0.3em] uppercase italic">
                                Organize your destiny
                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BucketListApp />);
    </script>
</body>
</html>
