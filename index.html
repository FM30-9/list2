<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Bucket List</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 10px;
        }

        body {
            margin: 0;
            padding: 0;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        // LucideアイコンをReactコンポーネントとして模倣するための簡易的なラッパー
        const Icon = ({ name, ...props }) => {
            const [svg, setSvg] = useState('');
            useEffect(() => {
                const icon = lucide.createIcons({ icons: { [name]: lucide[name] } });
            }, []);
            return <i data-lucide={name} {...props}></i>;
        };

        const App = () => {
            const [items, setItems] = useState([]);
            const [inputValue, setInputValue] = useState('');
            const [draggedIndex, setDraggedIndex] = useState(null);
            const [editingTagId, setEditingTagId] = useState(null);
            const [tagInput, setTagInput] = useState('');
            const [sortMode, setSortMode] = useState('custom');

            useEffect(() => {
                const savedItems = localStorage.getItem('bucket-list-final');
                if (savedItems) setItems(JSON.parse(savedItems));
                lucide.createIcons();
            }, []);

            useEffect(() => {
                localStorage.setItem('bucket-list-final', JSON.stringify(items));
                lucide.createIcons();
            }, [items, sortedItems]);

            const addItem = (e) => {
                e.preventDefault();
                if (!inputValue.trim()) return;
                const newItem = {
                    id: Date.now(),
                    text: inputValue,
                    completed: false,
                    tags: [],
                    createdAt: new Date().toLocaleDateString('ja-JP', { month: 'short', day: 'numeric' }),
                    completedAt: null,
                };
                setItems([newItem, ...items]);
                setInputValue('');
            };

            const toggleComplete = (id) => {
                setItems(items.map(item => {
                    if (item.id === id) {
                        const isCompleting = !item.completed;
                        return {
                            ...item,
                            completed: isCompleting,
                            completedAt: isCompleting ? new Date().toLocaleDateString('ja-JP', { month: 'short', day: 'numeric' }) : null
                        };
                    }
                    return item;
                }));
            };

            const addTag = (itemId) => {
                if (!tagInput.trim()) return;
                const cleanTag = tagInput.trim().replace(/^#/, '');
                setItems(items.map(item => {
                    if (item.id === itemId) {
                        if (item.tags.includes(cleanTag)) return item;
                        return { ...item, tags: [...item.tags, cleanTag] };
                    }
                    return item;
                }));
                setTagInput('');
                setEditingTagId(null);
            };

            const getTagColor = (tag) => {
                const colors = ['bg-blue-500/20 text-blue-400', 'bg-purple-500/20 text-purple-400', 'bg-rose-500/20 text-rose-400', 'bg-amber-500/20 text-amber-400'];
                let hash = 0;
                for (let i = 0; i < tag.length; i++) hash = tag.charCodeAt(i) + ((hash << 5) - hash);
                return colors[Math.abs(hash) % colors.length];
            };

            const sortedItems = useMemo(() => {
                const list = [...items];
                if (sortMode === 'completed-bottom') return list.sort((a, b) => (a.completed === b.completed ? 0 : a.completed ? 1 : -1));
                if (sortMode === 'tags') return list.sort((a, b) => (a.tags[0] || 'zzz').localeCompare(b.tags[0] || 'zzz'));
                return items;
            }, [items, sortMode]);

            return (
                <div className="min-h-screen bg-[#0f172a] p-4 md:p-12 text-slate-200">
                    <div className="max-w-xl mx-auto flex flex-col h-[90vh]">
                        {/* Header */}
                        <div className="mb-6 flex justify-between items-end">
                            <h1 className="text-3xl font-black tracking-tighter">Bucket List</h1>
                            <div className="text-slate-500">{items.filter(i => i.completed).length} / {items.length}</div>
                        </div>

                        {/* Sort */}
                        <div className="flex bg-slate-900/50 p-1 rounded-xl border border-white/5 mb-6 self-start text-[10px] font-bold">
                            <button onClick={() => setSortMode('custom')} className={`px-3 py-1.5 rounded-lg ${sortMode === 'custom' ? 'bg-white text-slate-900' : 'text-slate-500'}`}>CUSTOM</button>
                            <button onClick={() => setSortMode('tags')} className={`px-3 py-1.5 rounded-lg ${sortMode === 'tags' ? 'bg-indigo-500 text-white' : 'text-slate-500'}`}>TAGS</button>
                            <button onClick={() => setSortMode('completed-bottom')} className={`px-3 py-1.5 rounded-lg ${sortMode === 'completed-bottom' ? 'bg-emerald-500 text-white' : 'text-slate-500'}`}>AUTO-SORT</button>
                        </div>

                        {/* Input */}
                        <form onSubmit={addItem} className="relative flex gap-2 bg-slate-900 border border-white/10 p-2 rounded-2xl mb-8">
                            <input value={inputValue} onChange={(e) => setInputValue(e.target.value)} placeholder="新しい冒険を計画..." className="flex-1 bg-transparent px-4 py-2 outline-none text-white" />
                            <button type="submit" className="bg-white text-slate-950 px-4 rounded-xl font-bold">+</button>
                        </form>

                        {/* List */}
                        <div className="flex-1 overflow-y-auto custom-scrollbar space-y-4">
                            {sortedItems.map((item, index) => (
                                <div key={item.id} className={`p-5 rounded-2xl border transition-all ${item.completed ? 'bg-emerald-950/10 border-emerald-500/20' : 'bg-white/5 border-white/5'}`}>
                                    <div className="flex items-center gap-4">
                                        <div onClick={() => toggleComplete(item.id)} className="cursor-pointer">
                                            {item.completed ? <div className="w-6 h-6 bg-emerald-500 rounded-lg flex items-center justify-center text-black">✓</div> : <div className="w-6 h-6 border-2 border-slate-700 rounded-lg"></div>}
                                        </div>
                                        <div className="flex-1">
                                            <div className={`font-semibold ${item.completed ? 'text-emerald-400/50' : 'text-white'}`}>{item.text}</div>
                                            <div className="text-[10px] text-slate-600 mt-1">作成: {item.createdAt} {item.completedAt && `| 達成: ${item.completedAt}`}</div>
                                        </div>
                                        <button onClick={() => setItems(items.filter(i => i.id !== item.id))} className="text-slate-700 hover:text-rose-500">×</button>
                                    </div>
                                    <div className="mt-3 flex flex-wrap gap-2 pl-10">
                                        {item.tags.map(tag => <span key={tag} className={`px-2 py-0.5 rounded text-[10px] font-bold ${getTagColor(tag)}`}>#{tag}</span>)}
                                        {editingTagId === item.id ? (
                                            <input autoFocus className="bg-slate-800 text-[10px] px-2 rounded outline-none w-16" onKeyDown={(e) => e.key === 'Enter' && addTag(item.id)} onChange={(e) => setTagInput(e.target.value)} onBlur={() => setEditingTagId(null)} />
                                        ) : (
                                            <button onClick={() => setEditingTagId(item.id)} className="text-[10px] text-slate-600 hover:text-slate-400"># タグ追加</button>
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
